<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Azreon Tracks Platform</title>
  <link rel="stylesheet" href="base.css">
  <style>
    :root {
      --bg:             #0a0604;
      --bg-image:       linear-gradient(248deg, transparent 0%, transparent 32%, rgba(250,225,160,.45) 42%, rgba(255,240,200,.85) 48%, rgba(250,225,160,.45) 54%, transparent 64%, transparent 100%),
                        radial-gradient(ellipse at 8% 10%, rgba(235,182,83,.90) 0%, transparent 50%),
                        radial-gradient(ellipse at 85% 85%, rgba(10,6,2,.35) 0%, transparent 45%),
                        linear-gradient(145deg, #d4a818 0%, #3a2808 40%, #1a0e04 65%, #0a0604 100%);
      --primary:        #626c78;       /* ── change only this to retheme all action elements ── */
      --primary-dark:   color-mix(in srgb, var(--primary) 75%, #000);
      --track-hover:    color-mix(in srgb, var(--primary) 12%, #fff);
      --track-active:   color-mix(in srgb, var(--primary) 30%, #fff);
      --accent:         #d4a843;
      --accent-dark:    #b8892a;
      --loading-colour: var(--accent);
      --played:         #111;
      --secondary:      #888;
      --text:           #222;
      --muted:          #555;
      --hint:           #999;
      --border:         #eee;
    }
    #reports-btn { background: #d9a66e; }
    #reports-btn:hover { background: var(--accent-dark); }
    .options-wrap { position: absolute; top: 12px; right: 12px; }
    .options-btn { background: rgba(0,0,0,.07); border: none; color: #888; font-size: 1.6rem; font-weight: 700; line-height: 1; cursor: pointer; padding: 4px 8px; border-radius: 8px; transition: color .15s, background .15s; }
    .options-btn:hover, .options-btn:active, .options-btn.open { color: #555; background: rgba(0,0,0,.13); }
    .options-menu { display: none; position: absolute; top: calc(100% + 4px); right: 0; background: #fff; border-radius: 12px; box-shadow: 0 6px 28px rgba(0,0,0,.36); border: 1px solid rgba(0,0,0,.2); min-width: 200px; overflow: hidden; z-index: 100; }
    #now-playing { text-align: center; font-size: 1.3rem; font-weight: 700; color: var(--text); margin-bottom: 18px; padding-right: 28px; }
    .player { display: flex; flex-direction: column; gap: 12px; }
    #my-reports-card h2 { font-size: 1.1rem; color: #333; margin-bottom: 14px; }
    .my-report-item { display: flex; align-items: center; gap: 8px; padding: 10px 0; border-bottom: 1px solid #eee; cursor: pointer; min-width: 0; }
    .my-report-item:last-child { border-bottom: none; }
    .my-report-item:hover .my-col-title { color: var(--primary); text-decoration: underline; }
    .my-col-title { flex: 1; font-weight: 500; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-width: 0; font-size: .88rem; }
    .my-col-date  { width: 76px; flex-shrink: 0; font-size: .76rem; color: var(--muted); text-align: right; }
    .my-col-num   { width: 22px; flex-shrink: 0; font-size: .76rem; color: var(--muted); text-align: right; }
    .player-controls { display: flex; align-items: center; gap: 12px; }
    .btn-play { flex-shrink: 0; width: 50px; height: 50px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .btn-play:hover { background: var(--primary-dark); }
    .btn-play svg { fill: #fff; width: 22px; height: 22px; }
    .btn-play:disabled { opacity: .4; cursor: not-allowed; }
    .player-time { font-size: .85rem; color: var(--muted); white-space: nowrap; min-width: 90px; text-align: center; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .btn-volume { flex-shrink: 0; width: 32px; height: 32px; border: none; background: none; padding: 0; cursor: pointer; display: flex; align-items: center; justify-content: center; }
    .btn-volume svg { fill: var(--muted); width: 22px; height: 22px; flex-shrink: 0; }
    .btn-volume svg line { stroke: var(--muted); stroke-width: 2; stroke-linecap: round; }
    .btn-volume:hover svg { fill: var(--primary); }
    .btn-volume:hover svg line { stroke: var(--primary); }
    input[type=range].volume-slider { -webkit-appearance: none; appearance: none; width: 72px; height: 4px; border-radius: 2px; background: #ddd; outline: none; margin: 0; padding: 0; border: none; cursor: pointer; }
    input[type=range].volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: var(--primary); cursor: pointer; }
    input[type=range].volume-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: var(--primary); border: none; cursor: pointer; }
    .progress-wrap { position: relative; height: 6px; border-radius: 3px; background: #e8e8e8; cursor: pointer; overflow: hidden; }
    .progress-buffered { position: absolute; left: 0; top: 0; bottom: 0; background: var(--accent); border-radius: 3px; width: 0%; transition: width .3s linear; opacity: 0.5; }
    .progress-played { position: absolute; left: 0; top: 0; bottom: 0; background: var(--played); border-radius: 3px; width: 0%; }
    .progress-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: var(--played); left: 0%; transition: left .1s; }
    .progress-loading { display: none; position: absolute; left: 0; top: 0; bottom: 0; width: 40%; background: linear-gradient(90deg, transparent, var(--accent), transparent); animation: shimmer 1.2s ease-in-out infinite; }
    .progress-loading.active { display: block; }
    @keyframes shimmer { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }
    .loading-label { display: none; font-size: .78rem; color: var(--accent-dark); text-align: center; margin-top: 4px; }
    .loading-label.active { display: block; }
    .track-item { padding: 14px; border-bottom: 1px solid var(--border); cursor: pointer; border-radius: 8px; transition: background .15s; text-align: center; }
    .track-item:last-child { border-bottom: none; }
    .track-item:hover { background: var(--track-hover); }
    .track-item.active { background: var(--track-active); }
    .track-item.active .track-title { font-weight: 600; }
    .track-title { font-weight: 400; color: var(--text); }
    .track-duration { font-size: .85rem; color: var(--secondary); margin-top: 4px; }
    #player-section { display: none; }
    .mode-toggle { display: flex; align-items: center; justify-content: center; gap: 0; border: 1px solid #ddd; border-radius: 8px; overflow: hidden; }
    .mode-toggle button { flex: 1; padding: 8px 12px; background: #fff; border: none; font-size: .82rem; color: var(--muted); cursor: pointer; transition: background .15s, color .15s; }
    .mode-toggle button.active { background: var(--primary); color: #fff; font-weight: 600; }
    .mode-toggle button:not(.active):hover { background: var(--track-hover); }
    .mode-hint { font-size: .72rem; color: var(--hint); text-align: center; margin-top: 6px; }
    .toggle-divider { border: none; border-top: 1px solid #e8e8e8; margin: 14px 0 12px; }
  </style>
</head>
<body>
<div class="container">

  <div id="header-banner" style="display:none;margin-bottom:16px">
    <img id="header-img" src="" alt="" draggable="false"
         style="border-radius:12px;display:block;margin:0 auto;pointer-events:none;-webkit-user-select:none;user-select:none;">
  </div>

  <div id="startup-loading">
    <div class="card" style="text-align:center;padding:32px 24px;display:inline-block;min-width:200px">
      <div class="startup-bar" style="margin:0 auto 12px"></div>
      <div class="startup-label" style="display:block;color:#888">Loading…</div>
    </div>
  </div>

  <div id="player-section">
    <div class="card" style="position:relative">
      <div id="now-playing">Select a track below</div>
      <div class="options-wrap" id="options-wrap">
        <button class="options-btn" id="options-btn" aria-label="Options" aria-expanded="false">⋮</button>
        <div class="options-menu" id="options-menu">
          <div class="options-email" id="options-email"></div>
          <button class="options-item options-item-danger" id="logout-btn">Log Out</button>
        </div>
      </div>
      <div class="player">
        <div class="player-controls">
          <button class="btn-play" id="btn-play" disabled>
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <span class="player-time" id="player-time">0:00 / 0:00</span>
          <div class="volume-wrap">
            <button class="btn-volume" id="btn-volume" aria-label="Mute">
              <svg id="icon-volume-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
              <svg id="icon-volume-off" viewBox="0 0 24 24" style="display:none"><path d="M3 9v6h4l5 5V4L7 9H3z"/><line x1="16" y1="9" x2="22" y2="15"/><line x1="22" y1="9" x2="16" y2="15"/></svg>
            </button>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>
        </div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-buffered" id="progress-buffered"></div>
          <div class="progress-loading" id="progress-loading"></div>
          <div class="progress-played"  id="progress-played"></div>
          <div class="progress-thumb"   id="progress-thumb"></div>
        </div>
        <div class="loading-label" id="loading-label">Loading…</div>
        <div id="mode-slot-player"></div>
      </div>
    </div>
    <div class="card" id="track-list-card">
      <div id="track-list"></div>
    </div>
    <div class="card" id="mode-card-bottom">
      <div id="mode-slot-bottom"></div>
    </div>
    <div class="card" id="my-reports-card" style="display:none">
      <h2>My Reports</h2>
      <div id="my-reports-list"></div>
    </div>
    <button class="secondary" id="reports-btn" style="display:none">Management</button>
  </div>

  <!-- Mode toggle template — injected into the chosen slot on load -->
  <template id="mode-toggle-template">
    <div class="mode-toggle" id="mode-toggle">
      <button id="mode-stream" onclick="setMode('stream')">Stream</button>
      <button id="mode-blob"   onclick="setMode('blob')">Preload</button>
    </div>
    <div class="mode-hint" id="mode-hint"></div>
  </template>

  <!-- Wake-lock toggle — injected after the mode toggle in the same slot -->
  <template id="wakelock-toggle-template">
    <hr class="toggle-divider" id="wakelock-divider">
    <div class="mode-toggle" id="wakelock-toggle">
      <button id="wakelock-off" onclick="setWakeLock(false)"></button>
      <button id="wakelock-on"  onclick="setWakeLock(true)"></button>
    </div>
    <div class="mode-hint" id="wakelock-hint"></div>
  </template>

</div>
<script src="shared.js"></script>
<script>
  const UI = {
    PLATFORM_ARTIST:    'Azreon Tracks Platform',
    PAGE_TITLE:         'Azreon Tracks Platform',
    LOGOUT_BTN:         'Log Out',
    NOW_PLAYING_IDLE:   'Select a track below',
    NO_TRACKS_MSG:      'No tracks available.',
    TRACK_NOT_AVAILABLE:'That track isn’t available on your account.',
    LOADING_TEXT:       'Loading…',
    MODE_BLOB_LABEL:    'Preload',
    MODE_STREAM_LABEL:  'Stream',
    MODE_BLOB_HINT:     'Downloads the full track first, then plays. Works offline once loaded.',
    MODE_STREAM_HINT:   'Plays immediately, streams as you listen. Needs a connection throughout.',
    WAKELOCK_ON_LABEL:  'Keep Screen On',
    WAKELOCK_OFF_LABEL: 'Allow Auto-Lock',
    WAKELOCK_HINT_ON:   'Screen stays on while a track plays to avoid undesired pauses.',
    WAKELOCK_HINT_OFF:  'Your screen may lock during playback and stop it.',
  };

  const HEADER_IMAGE_URL      = '';  // page-specific banner; '' = use HEADER_IMAGE_DEFAULT in ui.js
  const HEADER_IMAGE_HEIGHT   = '';  // '' = use HEADER_IMAGE_HEIGHT_DEFAULT in ui.js (currently 70px)
  const HEADER_IMAGE_FILTER   = 'brightness(0) invert(1) drop-shadow(0 3px 4px rgba(0,0,0,.35))';  // white recolor (matching the default) + a soft shadow that follows each letter's shape

  const DEFAULT_MODE          = 'stream';
  const MODE_TOGGLE_POSITION  = 'bottom';
  const SINGLE_TRACK_HIDES_LIST = true;
  const SINGLE_TRACK_HIDE = [
    'track-list-card',
    'reports-btn',
    'my-reports-card',
    'mode-hint',
    'wakelock-hint',
    // 'mode-card-bottom',
    // 'mode-toggle',
  ];
  const REPORTS_IN_PLAYER = true;  // true = My Reports card inline in player; false = Reports button → reports.html

  let activeMode = localStorage.getItem('ap_mode') || DEFAULT_MODE;
  if (DEFAULT_MODE === 'hybrid') activeMode = 'hybrid';

  const wakeLockSupported = 'wakeLock' in navigator;
  let wakeLockEnabled = localStorage.getItem('ap_wakelock') === '1';
  let wakeLockSentinel = null;

  if (!token) {
    const _tp = new URLSearchParams(location.search).get('track');
    location.replace(_tp ? 'index.html?track=' + encodeURIComponent(_tp) : 'index.html');
  }

  // Internal player state — exactly one value at a time, the single source
  // of truth for "what is the player doing right now, mechanically". Event
  // logging and recovery logic check THIS, not independent ad-hoc flags, so
  // it's never ambiguous whether a given pause/play/start/end reflects real
  // user/browser activity or one of our own internal procedures.
  //   NORMAL          — ordinary playback; pause/play/start/end are real.
  //   SWITCHING_BLOB  — hybrid-mode stream->blob handoff in progress;
  //                      suppresses spurious start/end from the src swap.
  //   RECONNECTING    — watchdog-triggered recovery in progress; suppresses
  //                      the pause/play the forced reload inherently fires
  //                      from being logged as a real user pause/resume.
  const PlayerState = { NORMAL: 'normal', SWITCHING_BLOB: 'switching-blob', RECONNECTING: 'reconnecting' };
  let internalState = PlayerState.NORMAL;

  // Set immediately before every call WE make to fadePlay()/fadePause() (the
  // only two functions that ever call audio.play()/audio.pause() outside the
  // already-tracked blob-switch/reconnect paths), naming which of our own
  // surfaces triggered it ('button' | 'media_session' | 'autoplay'). Read
  // once by the next native play/pause event, then cleared. If a play/pause
  // event fires with this still null, nothing we did caused it — the browser
  // or OS paused/resumed the audio element on its own.
  let pendingPlaybackTrigger = null;

  let currentTrack    = null;
  let sessionId       = newSessionId();
  let wasPlaying      = false;
  let hasPaused       = false;
  let hasStartedPlaying = false;
  let heartbeatTimer  = null;
  const HEARTBEAT_MS  = 30000;
  let LOG_HEARTBEAT   = true;
  const WATCHDOG_INTERVAL_MS = 5000; // stall-detection cadence — was 15000, reduced for faster recovery

  let pendingTrackCode = new URLSearchParams(location.search).get('track');

  const audio = new Audio();
  audio.preload = 'auto';

  document.title                    = UI.PAGE_TITLE;
  $('now-playing').textContent      = UI.NOW_PLAYING_IDLE;
  $('loading-label').textContent    = UI.LOADING_TEXT;
  $('logout-btn').textContent       = UI.LOGOUT_BTN;
  document.querySelector('.startup-label').textContent = UI.LOADING_TEXT;
  injectModeToggle();
  syncModeUI();

  loadPlayer();

  async function loadPlayer() {
    const res = await fetch(WORKER + '/tracks', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) {
      localStorage.removeItem('ap_token');
      localStorage.removeItem('ap_email');
      const _tc = new URLSearchParams(location.search).get('track');
      location.replace(_tc ? 'index.html?track=' + encodeURIComponent(_tc) : 'index.html');
      return;
    }
    const data = await res.json();

    if (data.settings?.log_heartbeat !== undefined) {
      LOG_HEARTBEAT = data.settings.log_heartbeat === '1';
    }
    if (data.is_admin) {
      $('reports-btn').style.display = '';
    } else if (data.has_reports) {
      if (REPORTS_IN_PLAYER) {
        loadMyReports();
      } else {
        $('reports-btn').style.display = '';
      }
    }

    $('startup-loading').style.display = 'none';
    $('player-section').style.display  = 'block';

    const list = $('track-list');
    list.innerHTML = '';
    if (!data.tracks || data.tracks.length === 0) {
      list.innerHTML = `<p style="color:var(--text);padding:14px;text-align:center">${UI.NO_TRACKS_MSG}</p>`;
      const modeCard = $('mode-card-bottom'); if (modeCard) modeCard.style.display = 'none';
      return;
    }
    data.tracks.forEach(track => {
      const div = document.createElement('div');
      div.className = 'track-item';
      div.dataset.trackId   = track.id;
      div.dataset.trackCode = track.track_code;
      div.innerHTML = `<div class="track-title">${track.title}</div>` +
        (track.duration ? `<div class="track-duration">${track.duration}</div>` : '');
      div.onclick = () => playTrack(track, div);
      list.appendChild(div);
    });

    if (pendingTrackCode) {
      const code = pendingTrackCode;
      pendingTrackCode = null;
      const match = data.tracks.find(t => t.track_code === code);
      if (match) {
        const el = list.querySelector(`[data-track-code="${code}"]`);
        playTrack(match, el);
        if (SINGLE_TRACK_HIDES_LIST) {
          for (const id of SINGLE_TRACK_HIDE) {
            const el = $(id);
            if (el) el.style.display = 'none';
          }
        }
      } else {
        $('now-playing').textContent = UI.TRACK_NOT_AVAILABLE;
      }
    }
  }

  // ── Play a track ──────────────────────────────────────────────────────
  let currentBlobUrl  = null;
  let fetchController = null;

  function playTrack(track, el) {
    document.querySelectorAll('.track-item').forEach(d => d.classList.remove('active'));
    if (el) el.classList.add('active');

    if (currentTrack && wasPlaying) logEvent('stop', eventDiagnostics({ trigger: 'track_switch' }));
    wasPlaying = false;

    audio.muted = true;
    audio.pause();
    audio.removeAttribute('src');
    audio.load();

    currentTrack      = track;
    sessionId         = newSessionId();
    hasPaused         = false;
    internalState     = PlayerState.NORMAL;
    hasStartedPlaying = false;
    stopHeartbeat();
    stopWatchdog();

    if (fetchController) { fetchController.abort(); fetchController = null; }
    if (currentBlobUrl)  { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

    showPause(false);
    $('progress-played').style.width = '0%';
    $('progress-thumb').style.left   = '0%';
    $('player-time').textContent     = '0:00 / 0:00';
    $('now-playing').textContent     = track.title;
    $('btn-play').disabled = true;
    setLoading(true);

    document.querySelectorAll('.track-item').forEach(d => d.style.pointerEvents = 'none');

    const audioUrl = `${WORKER}/audio/${track.r2_key}?t=${encodeURIComponent(token)}`;

    if (activeMode === 'blob') {
      fetchController = new AbortController();
      fetch(audioUrl, { signal: fetchController.signal })
        .then(res => { if (!res.ok) throw new Error('Fetch failed'); return res.blob(); })
        .then(blob => {
          if (fetchController?.signal.aborted || currentTrack !== track) return;
          currentBlobUrl = URL.createObjectURL(blob);
          audio.src = currentBlobUrl;
          audio.load();
          startInitialPlayback();
        })
        .catch(err => {
          if (err.name !== 'AbortError') {
            console.warn('Blob download failed, falling back to stream:', err);
            audio.src = audioUrl;
            audio.load();
            startInitialPlayback();
          }
        });
    } else if (activeMode === 'stream') {
      audio.src = audioUrl;
      audio.load();
      startInitialPlayback();
    } else {
      audio.src = audioUrl;
      audio.load();
      startInitialPlayback();
      hybridBlobSwitch(audioUrl, track);
    }

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: track.title, artist: UI.PLATFORM_ARTIST, album: '',
      });
      navigator.mediaSession.setActionHandler('play',  () => { if (audio.paused)  fadePlay('media_session'); });
      navigator.mediaSession.setActionHandler('pause', () => { if (!audio.paused) fadePause('media_session'); });
      navigator.mediaSession.setActionHandler('stop',  () => { if (!audio.paused) fadePause('media_session'); });
    }
  }

  function startInitialPlayback() {
    audio.addEventListener('canplaythrough', function onCanPlay() {
      audio.removeEventListener('canplaythrough', onCanPlay);
      $('btn-play').disabled = false;
      setLoading(false);
      hasStartedPlaying = true;
      document.querySelectorAll('.track-item').forEach(d => d.style.pointerEvents = '');
      audio.muted = false;
      fadePlay('autoplay');
    }, { once: true });

    audio.addEventListener('error', function onErr() {
      audio.removeEventListener('error', onErr);
      audio.muted = false;
      $('btn-play').disabled = false;
      setLoading(false);
      document.querySelectorAll('.track-item').forEach(d => d.style.pointerEvents = '');
    }, { once: true });
  }

  function hybridBlobSwitch(audioUrl, track) {
    fetchController = new AbortController();
    const signal = fetchController.signal;
    fetch(audioUrl, { signal })
      .then(res => { if (!res.ok) throw new Error('Fetch failed'); return res.blob(); })
      .then(blob => {
        if (signal.aborted || audio.ended || currentTrack !== track) return;
        if (!hasStartedPlaying) return;
        const remaining = isFinite(audio.duration) ? audio.duration - audio.currentTime : 999;
        if (remaining < 30) return;
        currentBlobUrl = URL.createObjectURL(blob);
        const pos     = audio.currentTime;
        const playing = !audio.paused;
        internalState = PlayerState.SWITCHING_BLOB;
        audio.src = currentBlobUrl;
        audio.addEventListener('canplay', function onBlobReady() {
          audio.removeEventListener('canplay', onBlobReady);
          if (!currentTrack || audio.ended) return;
          audio.currentTime = pos;
          if (playing) audio.play().catch(() => {});
          setTimeout(() => { internalState = PlayerState.NORMAL; }, 500);
        }, { once: true });
      })
      .catch(err => {
        if (err.name !== 'AbortError')
          console.warn('Hybrid blob fetch failed, continuing from stream:', err);
      });
  }

  const FADE_AUDIO_ACTIONS = true;
  const FADE_STEPS  = 8;
  const FADE_STEP_MS = 5;
  let fadeTimer  = null;
  let userVolume = 1;

  function fadePlay(source = 'button') {
    pendingPlaybackTrigger = source;
    if (!FADE_AUDIO_ACTIONS) { audio.play().catch(() => {}); return; }
    if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
    audio.volume = 0;
    audio.play().then(() => {
      let i = 0;
      fadeTimer = setInterval(() => {
        i++;
        audio.volume = Math.min(userVolume, userVolume * (i / FADE_STEPS));
        if (i >= FADE_STEPS) { clearInterval(fadeTimer); fadeTimer = null; audio.volume = userVolume; }
      }, FADE_STEP_MS);
    }).catch(() => { audio.volume = userVolume; });
  }

  function fadePause(source = 'button') {
    pendingPlaybackTrigger = source;
    if (!FADE_AUDIO_ACTIONS) { audio.pause(); return; }
    if (fadeTimer) { clearInterval(fadeTimer); fadeTimer = null; }
    const start = audio.volume || userVolume;
    let i = 0;
    fadeTimer = setInterval(() => {
      i++;
      audio.volume = Math.max(0, start * (1 - i / FADE_STEPS));
      if (i >= FADE_STEPS) {
        clearInterval(fadeTimer); fadeTimer = null;
        audio.pause();
        audio.volume = userVolume;
      }
    }, FADE_STEP_MS);
  }

  $('btn-play').onclick = () => {
    if (!currentTrack) return;
    if (audio.paused) fadePlay(); else fadePause();
  };

  $('volume-slider').oninput = function() { userVolume = parseFloat(this.value); audio.volume = userVolume; };

  $('btn-volume').onclick = () => { audio.muted = !audio.muted; };

  // 'volumechange' fires for both volume AND muted changes — using it as the
  // single source of truth for the icon means it stays correct even when
  // audio.muted is set elsewhere in the code (e.g. muted-before-teardown on
  // track switch), not just from this button.
  audio.addEventListener('volumechange', () => {
    $('icon-volume-on').style.display  = audio.muted ? 'none' : '';
    $('icon-volume-off').style.display = audio.muted ? ''     : 'none';
  });

  audio.addEventListener('timeupdate',     updateProgress);
  audio.addEventListener('progress',       updateBuffered);
  audio.addEventListener('durationchange', updateProgress);

  function updateProgress() {
    const dur = audio.duration;
    const cur = audio.currentTime;
    if (!dur || isNaN(dur)) return;
    const pct = (cur / dur) * 100;
    $('progress-played').style.width = pct + '%';
    $('progress-thumb').style.left   = pct + '%';
    $('player-time').textContent     = `${fmt(cur)} / ${fmt(dur)}`;
  }

  function updateBuffered() {
    const dur = audio.duration;
    if (!dur || isNaN(dur) || audio.buffered.length === 0) return;
    $('progress-buffered').style.width = ((audio.buffered.end(audio.buffered.length - 1) / dur) * 100) + '%';
  }

  $('progress-wrap').addEventListener('click', function(e) {
    if (!audio.duration) return;
    const rect = this.getBoundingClientRect();
    const fromPositionMs = Math.round((audio.currentTime || 0) * 1000);
    audio.currentTime = ((e.clientX - rect.left) / rect.width) * audio.duration;
    logEvent('seek', { fromPositionMs, ...eventDiagnostics({ trigger: 'progress_bar_click' }) });
  });

  function handleTrackEnd() {
    if (!wasPlaying) return;
    wasPlaying = false;
    logEvent('end', eventDiagnostics({ trigger: audio.ended ? 'native_ended' : 'timeupdate_threshold' }));
    showPause(false);
    stopHeartbeat();
    stopWatchdog();
    releaseWakeLock();
    $('now-playing').textContent      = UI.NOW_PLAYING_IDLE;
    $('progress-played').style.width  = '0%';
    $('progress-thumb').style.left    = '0%';
    document.querySelectorAll('.track-item').forEach(d => d.style.pointerEvents = '');
  }

  audio.addEventListener('play', () => {
    showPause(true);
    // pendingPlaybackTrigger is set by fadePlay() immediately before it calls
    // audio.play() — if it's still null here, nothing we did caused this
    // native 'play', meaning the browser/OS resumed playback on its own.
    const triggeredBy = pendingPlaybackTrigger || 'external';
    pendingPlaybackTrigger = null;
    if (internalState === PlayerState.SWITCHING_BLOB) return;
    if (internalState !== PlayerState.RECONNECTING) {
      if (!wasPlaying) { logEvent('start', eventDiagnostics({ trigger: triggeredBy })); wasPlaying = true; }
      else if (hasPaused) { logEvent('resume', eventDiagnostics({ trigger: triggeredBy })); hasPaused = false; }
    }
    startHeartbeat();
    resetWatchdog();
    acquireWakeLock();
  });

  audio.addEventListener('timeupdate', () => {
    // timeupdate only fires while time is genuinely advancing — a reliable
    // sign playback isn't actually stuck, even if a spurious 'stalled' event
    // (seen on Safari without readyState ever dropping) left the loading
    // indicator on with nothing left to clear it (it's only ever cleared by
    // 'playing', which doesn't fire again if Safari never paused anything).
    if (!audio.paused) setLoading(false);
    if (wasPlaying && internalState !== PlayerState.SWITCHING_BLOB && isFinite(audio.duration) && audio.duration > 0
        && audio.currentTime >= audio.duration - 0.25) {
      handleTrackEnd();
    }
  });

  audio.addEventListener('ended', handleTrackEnd);

  audio.addEventListener('pause', () => {
    showPause(false);
    // Same logic as 'play' above — read+clear unconditionally, at the top,
    // so a stale value never bleeds into a later, unrelated pause/play.
    const triggeredBy = pendingPlaybackTrigger || 'external';
    pendingPlaybackTrigger = null;
    if (!wasPlaying) return;
    if (!audio.ended && internalState !== PlayerState.RECONNECTING) {
      logEvent('pause', eventDiagnostics({ trigger: triggeredBy }));
      hasPaused = true;
    }
    stopHeartbeat();
    stopWatchdog();
    releaseWakeLock();
  });

  // Persistent native error listener — separate from the one-time listener
  // above (line ~413) that only handles initial-load UI cleanup. Until now,
  // the ONLY path that ever logged 'error' was the watchdog's polling-based
  // stall detection (frozen position + frozen buffer for 5s) — a genuine
  // native MediaError firing mid-playback without producing that exact
  // frozen pattern would go completely unrecorded. This complements the
  // watchdog rather than replacing it; both can legitimately fire for the
  // same real incident (immediate native error, then the watchdog catching
  // the resulting stall a few seconds later if recovery isn't fast enough)
  // — that's two honest records of one incident, not double-counting.
  // Suppressed during RECONNECTING/SWITCHING_BLOB since those states
  // deliberately manipulate audio.src/load() themselves and could raise a
  // transient 'error' as a side effect of our own code, not a real fault.
  audio.addEventListener('error', () => {
    if (internalState === PlayerState.RECONNECTING || internalState === PlayerState.SWITCHING_BLOB) return;
    if (!currentTrack || audio.ended) return;
    logEvent('error', eventDiagnostics({ trigger: 'native_error' }));
  });

  // Diagnostic snapshot attachable to ANY logEvent call (not just errors) —
  // "eventDetail" so a session can be reconstructed from the logs alone
  // afterwards, instead of needing to guess from position/timestamp alone.
  // extra is merged in last so a call site can override/add fields
  // (e.g. { trigger: 'media_session', triggeredBy: 'user' }).
  function eventDiagnostics(extra = {}) {
    const conn = navigator.connection || navigator.mozConnection || navigator.webkitConnection;
    return {
      eventDetail: JSON.stringify({
        mediaErrorCode:  audio.error ? audio.error.code : null,
        mediaErrorMsg:   audio.error ? (audio.error.message || null) : null,
        networkState:    audio.networkState,
        readyState:      audio.readyState,
        connectionType:  conn ? (conn.effectiveType || null) : null,
        connectionRttMs: conn ? (conn.rtt ?? null) : null,
        visibilityState: document.visibilityState,
        wakeLockHeld:    !!wakeLockSentinel,
        ...extra,
      }),
    };
  }

  audio.addEventListener('waiting', () => { if (!audio.ended) setLoading(true); });
  audio.addEventListener('playing', () => setLoading(false));
  // 'stalled' is purely advisory in the spec — browsers (Safari especially)
  // fire it whenever a fetch attempt pauses even briefly, including during
  // benign ahead-of-playback buffering bursts where data keeps arriving just
  // fine. It is NOT proof anything is actually wrong, so it must never be the
  // thing that decides whether to log a real 'error' — only the watchdog's
  // buffered-growth check below (a fact, not an advisory event) decides that.
  // This listener only drives the cosmetic loading indicator.
  audio.addEventListener('stalled', () => {
    if (audio.ended) return;
    setLoading(true);
  });

  // ── Watchdog ──────────────────────────────────────────────────────────
  // A stall is only declared when BOTH playback position AND the buffered
  // range are frozen — bufferedEnd() is the same audio.buffered fact that
  // drives the buffer bar, so "is the browser still receiving data" is a
  // checkable fact, not an assumption. This is what actually distinguishes
  // Safari's ahead-of-playback buffering bursts (buffered keeps growing even
  // while currentTime briefly looks static) from a genuine stall (nothing
  // moving at all) — and it works the same way on every browser, since it's
  // standard Media Element state, not an engine-specific advisory event.
  let watchdogTimer = null;
  let lastPosition    = 0;
  let lastBufferedEnd = 0;

  function bufferedEnd() {
    return audio.buffered.length ? audio.buffered.end(audio.buffered.length - 1) : 0;
  }

  function resetWatchdog() {
    clearInterval(watchdogTimer);
    lastPosition    = audio.currentTime;
    lastBufferedEnd = bufferedEnd();
    watchdogTimer = setInterval(() => {
      // Stall detection runs regardless of visibility — background playback
      // is supported and expected to keep advancing, so a frozen position
      // while hidden is a real stall, not a false positive. Previously this
      // skipped entirely while hidden, which let stalls go undetected and
      // unrecovered for as long as the screen stayed locked.
      if (audio.ended) {
        lastPosition = audio.currentTime; lastBufferedEnd = bufferedEnd(); return;
      }
      const bufEnd = bufferedEnd();
      const isStalled = !audio.paused && currentTrack
        && audio.currentTime === lastPosition
        && bufEnd === lastBufferedEnd;
      if (isStalled) {
        console.log('Watchdog: stall detected at', audio.currentTime);
        setLoading(true); showPause(false); logEvent('error', eventDiagnostics({ trigger: 'watchdog_stall' }));
        stopHeartbeat(); clearInterval(watchdogTimer);
        const pos = audio.currentTime;
        // A forced reload inherently fires native pause/play on the audio
        // element — that's not the user pausing/resuming, it's an automatic
        // recovery, and logging it as pause/resume would be a false signal
        // in the compliance data (and could spuriously satisfy LENIENT's
        // quick-pause tolerance). The 'error' above is the truthful record
        // of what happened here; PlayerState.RECONNECTING suppresses the rest.
        internalState = PlayerState.RECONNECTING;
        audio.src = `${WORKER}/audio/${currentTrack.r2_key}?t=${encodeURIComponent(token)}`;
        audio.load(); audio.currentTime = pos;
        // Log the outcome of every recovery attempt, success or failure — a
        // silent .catch() here would mean a failed auto-resume leaves zero
        // trace in the data, indistinguishable from the participant simply
        // never pressing play again. err.name (e.g. 'NotAllowedError') is
        // the direct evidence for whether this is an autoplay-policy block.
        audio.play().then(() => {
          internalState = PlayerState.NORMAL;
          setLoading(false); showPause(true); startHeartbeat(); resetWatchdog();
          logEvent('recovery', eventDiagnostics({ trigger: 'watchdog_recovery', outcome: 'success' }));
        }).catch(err => {
          internalState = PlayerState.NORMAL;
          setLoading(false);
          logEvent('recovery', eventDiagnostics({
            trigger: 'watchdog_recovery',
            outcome: 'failed',
            recoveryErrorName: err && err.name,
            recoveryErrorMessage: err && err.message,
          }));
        });
      }
      lastPosition    = audio.currentTime;
      lastBufferedEnd = bufEnd;
    }, WATCHDOG_INTERVAL_MS);
  }

  function stopWatchdog() { clearInterval(watchdogTimer); watchdogTimer = null; }

  document.addEventListener('visibilitychange', () => {
    if (!currentTrack || audio.ended) return;
    if (document.visibilityState === 'hidden') {
      logEvent('background', eventDiagnostics());
    } else {
      logEvent('foreground', eventDiagnostics());
      lastPosition = audio.currentTime;
      // Always reset (not gated on !audio.paused) — the watchdog now runs
      // continuously regardless of visibility, but a fresh baseline here
      // also covers the case where the browser auto-paused playback due to
      // an error while backgrounded; the interval's own !audio.paused check
      // simply no-ops if genuinely paused.
      resetWatchdog();
      acquireWakeLock();
    }
  });

  // Page Lifecycle API — Chromium only (Android Chrome), not Safari. Gives
  // a more granular signal than visibilitychange alone: 'hidden' just means
  // not visible, but 'freeze' means the browser has actually suspended the
  // page's JS execution/timers, which 'hidden' on its own doesn't tell us.
  // Feature-detected; silently does nothing on browsers without it (iOS Safari).
  if ('onfreeze' in document) {
    document.addEventListener('freeze', () => {
      if (!currentTrack || audio.ended) return;
      logEvent('page_freeze', eventDiagnostics());
    });
    document.addEventListener('resume', () => {
      if (!currentTrack || audio.ended) return;
      logEvent('page_resume', eventDiagnostics());
    });
  }

  function showPause(on) {
    $('icon-play').style.display  = on ? 'none' : '';
    $('icon-pause').style.display = on ? ''     : 'none';
  }

  // ── Playback mode toggle ──────────────────────────────────────────────
  function injectModeToggle() {
    const tmpl = $('mode-toggle-template');
    const slot = MODE_TOGGLE_POSITION === 'player' ? $('mode-slot-player') : $('mode-slot-bottom');
    if (tmpl && slot) slot.appendChild(tmpl.content.cloneNode(true));
    if (MODE_TOGGLE_POSITION === 'player') {
      const bottomCard = $('mode-card-bottom');
      if (bottomCard) bottomCard.style.display = 'none';
      const t = $('mode-toggle');
      if (t) t.style.marginTop = '14px';
    }
    const wlTmpl = $('wakelock-toggle-template');
    if (wlTmpl && slot && wakeLockSupported) {
      slot.appendChild(wlTmpl.content.cloneNode(true));
      syncWakeLockUI();
    }
  }

  function setMode(mode) {
    if (mode !== 'blob' && mode !== 'stream') return;
    activeMode = mode;
    localStorage.setItem('ap_mode', mode);
    syncModeUI();
  }

  function syncModeUI() {
    const toggle     = $('mode-toggle');
    const hint       = $('mode-hint');
    const bottomCard = $('mode-card-bottom');
    if (!toggle) return;
    if (activeMode === 'hybrid') {
      toggle.style.display = 'none';
      if (hint) hint.textContent = '';
      if (MODE_TOGGLE_POSITION === 'bottom' && bottomCard) bottomCard.style.display = 'none';
      return;
    }
    toggle.style.display = 'flex';
    $('mode-blob').classList.toggle('active', activeMode === 'blob');
    $('mode-stream').classList.toggle('active', activeMode === 'stream');
    $('mode-blob').textContent   = UI.MODE_BLOB_LABEL;
    $('mode-stream').textContent = UI.MODE_STREAM_LABEL;
    if (hint) hint.textContent = activeMode === 'blob' ? UI.MODE_BLOB_HINT : UI.MODE_STREAM_HINT;
  }

  async function acquireWakeLock() {
    if (!wakeLockEnabled || !wakeLockSupported || wakeLockSentinel || audio.paused) return;
    try {
      wakeLockSentinel = await navigator.wakeLock.request('screen');
      wakeLockSentinel.addEventListener('release', () => { wakeLockSentinel = null; });
    } catch (e) { /* device may deny the request */ }
  }

  async function releaseWakeLock() {
    try { if (wakeLockSentinel) { await wakeLockSentinel.release(); wakeLockSentinel = null; } }
    catch (e) {}
  }

  function setWakeLock(on) {
    wakeLockEnabled = on;
    localStorage.setItem('ap_wakelock', on ? '1' : '0');
    syncWakeLockUI();
    if (on) acquireWakeLock(); else releaseWakeLock();
  }

  function syncWakeLockUI() {
    const toggle = $('wakelock-toggle');
    const hint   = $('wakelock-hint');
    if (!toggle) return;
    $('wakelock-off').classList.toggle('active', !wakeLockEnabled);
    $('wakelock-on').classList.toggle('active',   wakeLockEnabled);
    $('wakelock-off').textContent = UI.WAKELOCK_OFF_LABEL;
    $('wakelock-on').textContent  = UI.WAKELOCK_ON_LABEL;
    if (hint) hint.textContent = wakeLockEnabled ? UI.WAKELOCK_HINT_ON : UI.WAKELOCK_HINT_OFF;
  }

  let loadingDelayTimer = null;
  function setLoading(on) {
    if (on) {
      if (loadingDelayTimer) return;
      loadingDelayTimer = setTimeout(() => {
        $('progress-loading').classList.add('active');
        $('loading-label').classList.add('active');
        loadingDelayTimer = null;
      }, 400);
    } else {
      if (loadingDelayTimer) { clearTimeout(loadingDelayTimer); loadingDelayTimer = null; }
      $('progress-loading').classList.remove('active');
      $('loading-label').classList.remove('active');
    }
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    return `${Math.floor(s / 60)}:${Math.floor(s % 60).toString().padStart(2, '0')}`;
  }

  function startHeartbeat() {
    stopHeartbeat();
    heartbeatTimer = setInterval(() => { if (LOG_HEARTBEAT) logEvent('heartbeat', eventDiagnostics()); }, HEARTBEAT_MS);
  }
  function stopHeartbeat() {
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  }

  function logEvent(type, extra = {}) {
    if (!currentTrack || !token) return;
    fetch(WORKER + '/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({
        clientTimestamp: new Date().toISOString(),
        trackId:    currentTrack.id,
        trackTitle: currentTrack.title,
        trackCode:  currentTrack.track_code ?? null,
        eventType:  type,
        positionMs: Math.round((audio.currentTime || 0) * 1000),
        durationMs: isFinite(audio.duration) ? Math.round(audio.duration * 1000) : null,
        sessionId,
        ...extra,
      }),
    });
  }

  // sendBeacon variant — a normal fetch() can be silently cancelled by the
  // browser mid-flight once the page is actually being torn down, which is
  // exactly the moment 'pagehide' fires. sendBeacon is built specifically to
  // survive that, at the cost of not supporting custom headers — the token
  // goes via the existing ?t= query-param fallback (same one the <audio>
  // element itself already relies on, since it can't send headers either).
  function logEventBeacon(type, extra = {}) {
    if (!currentTrack || !token) return;
    const body = JSON.stringify({
      clientTimestamp: new Date().toISOString(),
      trackId:    currentTrack.id,
      trackTitle: currentTrack.title,
      trackCode:  currentTrack.track_code ?? null,
      eventType:  type,
      positionMs: Math.round((audio.currentTime || 0) * 1000),
      durationMs: isFinite(audio.duration) ? Math.round(audio.duration * 1000) : null,
      sessionId,
      ...extra,
    });
    navigator.sendBeacon(`${WORKER}/log?t=${encodeURIComponent(token)}`, body);
  }

  // 'pagehide' fires when the page is being hidden — which usually means the
  // tab/app is genuinely closing or navigating away, but on mobile it can
  // also fire on a hard backgrounding indistinguishable from 'visibilitychange'
  // alone. Logged honestly as "the page hid, possibly closing" rather than
  // asserting certainty the platform doesn't actually give us — a 'foreground'
  // arriving later in the same session would mean it wasn't actually closed.
  // Without this, closing mid-playback left precisely zero signal: the session
  // just goes silent forever, the same ambiguity that made the play_logs id
  // 5917 investigation harder than it needed to be.
  window.addEventListener('pagehide', () => {
    if (!currentTrack || audio.ended) return;
    logEventBeacon('page_close', eventDiagnostics({ trigger: 'pagehide' }));
  });

  $('reports-btn').onclick = () => location.href = 'reports.html';

  async function loadMyReports() {
    try {
      const res = await fetch(WORKER + '/reports', {
        headers: { 'Authorization': 'Bearer ' + token }
      });
      if (!res.ok) return;
      const data = await res.json();
      const reports = data.reports || [];
      const list = $('my-reports-list');
      if (!reports.length) {
        list.innerHTML = '<p style="font-size:.9rem;color:var(--muted);text-align:center;padding:8px 0">No reports available.</p>';
      } else {
        list.innerHTML = '';
        reports.forEach(r => {
          const div = document.createElement('div');
          div.className = 'my-report-item';
          div.innerHTML =
            `<span class="my-col-title">${r.title}</span>` +
            (r.report_date   ? `<span class="my-col-date">${r.report_date}</span>`     : '') +
            (r.report_number ? `<span class="my-col-num">${r.report_number}</span>`    : '');
          div.onclick = () => location.href = 'reports.html?report=' + r.id;
          list.appendChild(div);
        });
      }
      $('my-reports-card').style.display = '';
    } catch { /* silently skip if reports fail to load */ }
  }

  initOptionsMenu();

  function newSessionId() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }
</script>
<script src="ui.js"></script>
</body>
</html>
