<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Azreon Tracks Platform</title>
  <style>
    :root {
      --bg:        #C8962E;
      --bg-image:  none;
      --primary:   #1A4F8A;
      --accent:    #d4a843;
      --secondary: #888;
      --text:      #222;
      --muted:     #888;
      --err:       #c0392b;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background-color: var(--bg); background-image: var(--bg-image); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; }
    .container { max-width: 520px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1 { font-size: 1.4rem; color: var(--text); margin-bottom: 16px; text-align: center; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin: 8px 0; }
    button.primary { width: 100%; padding: 14px; background: var(--primary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    button.secondary { width: 100%; padding: 14px; background: var(--secondary); color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
    .msg { font-size: .9rem; color: var(--muted); text-align: center; margin-top: 8px; }
    .err { color: var(--err); }
    #startup-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .startup-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
    .startup-bar::after { content: ''; display: block; height: 100%; width: 40%; background: var(--accent); border-radius: 2px; animation: slide 1.2s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    .startup-label { font-size: .85rem; color: rgba(255,255,255,0.7); }
    #auth-section { display: none; }
    #otp-section  { display: none; }
  </style>
</head>
<body>
<div class="container">

  <div id="header-banner" style="display:none;margin-bottom:16px">
    <img id="header-img" src="" alt="" draggable="false"
         style="border-radius:12px;display:block;margin:0 auto;pointer-events:none;-webkit-user-select:none;user-select:none;">
  </div>

  <div id="startup-loading">
    <div class="card" style="text-align:center;padding:32px 24px;display:inline-block;min-width:200px">
      <div class="startup-bar" style="margin:0 auto 12px"></div>
      <div class="startup-label" style="display:block;color:#888">Loading…</div>
    </div>
  </div>

  <div id="auth-section" class="card">
    <h1>Authentication Step</h1>
    <p class="msg">Please enter your email address to receive a one-time code.</p>
    <input type="email" id="email-input" placeholder="you@example.com" autocomplete="email">
    <button class="primary" id="send-btn">Send Code</button>
    <div class="msg" id="send-msg"></div>
  </div>

  <div id="otp-section" class="card">
    <h1>Enter Your Code</h1>
    <p class="msg" id="otp-subtitle">Enter the 6-digit code sent to your email.</p>
    <input type="text" id="otp-input" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
    <button class="primary" id="verify-btn">Verify</button>
    <button class="secondary" id="back-btn">Back</button>
    <div class="msg" id="otp-msg"></div>
  </div>

</div>
<script>
  const WORKER           = 'https://audio-worker.azreon.workers.dev';
  const HEADER_IMAGE_URL    = null;  // null = disabled on this page; '' = use HEADER_IMAGE_DEFAULT in ui.js
  const HEADER_IMAGE_HEIGHT = '';    // '' = use HEADER_IMAGE_HEIGHT_DEFAULT in ui.js (currently 70px)
  const HEADER_IMAGE_FILTER = '';    // '' = use HEADER_IMAGE_FILTER_DEFAULT in ui.js (currently white)

  const $ = id => document.getElementById(id);

  const params      = new URLSearchParams(location.search);
  const trackParam  = params.get('track');
  const reportParam = params.get('report');

  const token = localStorage.getItem('ap_token');
  if (token) {
    redirectAfterAuth();
  } else {
    $('startup-loading').style.display = 'none';
    $('auth-section').style.display    = 'block';
    $('email-input').focus();
  }

  function redirectAfterAuth() {
    if (reportParam) {
      location.replace('reports.html?report=' + encodeURIComponent(reportParam));
    } else if (trackParam) {
      location.replace('player.html?track=' + encodeURIComponent(trackParam));
    } else {
      location.replace('player.html');
    }
  }

  $('send-btn').onclick = async function() {
    const email = $('email-input').value.trim();
    if (!email) { $('send-msg').textContent = 'Please enter your email.'; return; }
    this.disabled = true;
    $('send-msg').textContent = 'Sending…';
    $('send-msg').className   = 'msg';
    try {
      const res  = await post('/auth/send-otp', { email });
      const data = await res.json();
      if (res.ok) {
        $('auth-section').style.display = 'none';
        $('otp-section').style.display  = 'block';
        $('otp-msg').textContent = '';
        $('otp-input').value = '';
        $('otp-input').dataset.email = email;
        $('otp-input').focus();
      } else {
        $('send-msg').textContent = data.message || data.error || 'Error sending code.';
        $('send-msg').className   = 'msg err';
      }
    } catch {
      $('send-msg').textContent = 'Network error. Try again.';
      $('send-msg').className   = 'msg err';
    } finally { this.disabled = false; }
  };

  $('verify-btn').onclick = async function() {
    const otp   = $('otp-input').value.trim();
    const email = $('otp-input').dataset.email || '';
    if (!otp) { $('otp-msg').textContent = 'Please enter the code.'; return; }
    this.disabled = true;
    $('otp-msg').textContent = 'Verifying…';
    $('otp-msg').className   = 'msg';
    try {
      const res  = await post('/auth/verify-otp', { email, code: otp });
      const data = await res.json();
      if (res.ok && data.token) {
        localStorage.setItem('ap_token', data.token);
        localStorage.setItem('ap_email', email);
        redirectAfterAuth();
      } else {
        $('otp-msg').textContent = data.message || data.error || 'Invalid code.';
        $('otp-msg').className   = 'msg err';
      }
    } catch {
      $('otp-msg').textContent = 'Network error. Try again.';
      $('otp-msg').className   = 'msg err';
    } finally { this.disabled = false; }
  };

  $('email-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('send-btn').click();
  });

  $('otp-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('verify-btn').click();
  });

  $('back-btn').onclick = () => {
    $('otp-section').style.display  = 'none';
    $('auth-section').style.display = 'block';
    $('send-msg').textContent = '';
    $('send-msg').className   = 'msg';
  };

  function post(path, body) {
    return fetch(WORKER + path, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body),
    });
  }
</script>
<script src="ui.js"></script>
</body>
</html>
