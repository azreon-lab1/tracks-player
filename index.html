<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Audio Platform</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: sans-serif; background: #C8962E; min-height: 100vh; }
    .container { max-width: 520px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #fff; border-radius: 12px; padding: 24px; box-shadow: 0 2px 8px rgba(0,0,0,.08); margin-bottom: 16px; }
    h1 { font-size: 1.4rem; color: #222; margin-bottom: 16px; text-align: center; }
    input { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 8px; font-size: 1rem; margin: 8px 0; }
    button.primary { width: 100%; padding: 14px; background: #1A4F8A; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
    button.primary:disabled { opacity: .5; cursor: not-allowed; }
    button.secondary { width: 100%; padding: 14px; background: #888; color: #fff; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 8px; }
    .msg { font-size: .9rem; color: #c00; margin-top: 8px; min-height: 20px; }
    #now-playing { text-align: center; font-size: 1.3rem; font-weight: 700; color: #222; margin-bottom: 18px; }
    .player { display: flex; flex-direction: column; gap: 12px; }
    .player-controls { display: flex; align-items: center; gap: 12px; }
    .btn-play { flex-shrink: 0; width: 42px; height: 42px; border-radius: 50%; background: #1A4F8A; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s; }
    .btn-play:hover { background: #153f6e; }
    .btn-play svg { fill: #fff; width: 18px; height: 18px; }
    .btn-play:disabled { opacity: .4; cursor: not-allowed; }
    .player-time { font-size: .85rem; color: #555; white-space: nowrap; min-width: 90px; text-align: center; }
    .volume-wrap { display: flex; align-items: center; gap: 6px; margin-left: auto; }
    .volume-wrap svg { fill: #555; width: 18px; height: 18px; flex-shrink: 0; }
    input[type=range].volume-slider { -webkit-appearance: none; appearance: none; width: 72px; height: 4px; border-radius: 2px; background: #ddd; outline: none; margin: 0; padding: 0; border: none; cursor: pointer; }
    input[type=range].volume-slider::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #1A4F8A; cursor: pointer; }
    input[type=range].volume-slider::-moz-range-thumb { width: 14px; height: 14px; border-radius: 50%; background: #1A4F8A; border: none; cursor: pointer; }
    .progress-wrap { position: relative; height: 6px; border-radius: 3px; background: #e8e8e8; cursor: pointer; overflow: hidden; }
    .progress-buffered { position: absolute; left: 0; top: 0; bottom: 0; background: #d4a843; border-radius: 3px; width: 0%; transition: width .3s linear; opacity: 0.5; }
    .progress-played { position: absolute; left: 0; top: 0; bottom: 0; background: #111; border-radius: 3px; width: 0%; }
    .progress-thumb { position: absolute; top: 50%; transform: translate(-50%, -50%); width: 12px; height: 12px; border-radius: 50%; background: #111; left: 0%; transition: left .1s; }
    .progress-loading { display: none; position: absolute; left: 0; top: 0; bottom: 0; width: 40%; background: linear-gradient(90deg, transparent, #d4a843, transparent); animation: shimmer 1.2s ease-in-out infinite; }
    .progress-loading.active { display: block; }
    @keyframes shimmer { 0% { transform: translateX(-150%); } 100% { transform: translateX(400%); } }
    .loading-label { display: none; font-size: .78rem; color: #b8892a; text-align: center; margin-top: 4px; }
    .loading-label.active { display: block; }
    .track-item { padding: 14px; border-bottom: 1px solid #eee; cursor: pointer; border-radius: 8px; transition: background .15s; text-align: center; }
    .track-item:last-child { border-bottom: none; }
    .track-item:hover { background: #f0f4ff; }
    .track-item.active { background: #c5d4f5; }
    .track-item.active .track-title { font-weight: 600; }
    .track-title { font-weight: 400; color: #222; }
    .track-duration { font-size: .85rem; color: #888; margin-top: 4px; }
    #player-section { display: none; }
    #otp-section    { display: none; }
    #auth-section   { display: none; }
    #startup-loading { display: flex; align-items: center; justify-content: center; min-height: 60vh; }
    .startup-bar { width: 200px; height: 4px; background: rgba(255,255,255,0.3); border-radius: 2px; overflow: hidden; }
    .startup-bar::after { content: ''; display: block; height: 100%; width: 40%; background: #d4a843; border-radius: 2px; animation: slide 1.2s ease-in-out infinite; }
    @keyframes slide { 0% { transform: translateX(-100%); } 100% { transform: translateX(350%); } }
    .startup-label { font-size: .85rem; color: rgba(255,255,255,0.7); }
  </style>
</head>
<body>
<div class="container">

  <div id="startup-loading">
    <div class="card" style="text-align:center;padding:32px 24px;display:inline-block;min-width:200px">
      <div class="startup-bar" style="margin:0 auto 12px"></div>
      <div class="startup-label" style="display:block;color:#888">Loading…</div>
    </div>
  </div>

  <div id="auth-section" class="card">
    <h1>Audio Platform</h1>
    <p style="color:#555;margin-bottom:8px;text-align:center">Enter your email to receive an access code.</p>
    <input type="email" id="email-input" placeholder="your@email.com">
    <button class="primary" id="send-btn">Send Code</button>
    <div class="msg" id="auth-msg"></div>
  </div>

  <div id="otp-section" class="card">
    <h1>Enter Your Code</h1>
    <p style="color:#555;margin-bottom:8px;text-align:center">Check your email for the 6-digit code.</p>
    <input type="text" id="otp-input" placeholder="000000" maxlength="6" inputmode="numeric">
    <button class="primary" id="verify-btn">Verify</button>
    <button class="secondary" id="back-btn">Back</button>
    <div class="msg" id="otp-msg"></div>
  </div>

  <div id="player-section">
    <div class="card">
      <div id="now-playing">Select a track below</div>
      <div class="player">
        <div class="player-controls">
          <button class="btn-play" id="btn-play" disabled>
            <svg id="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
            <svg id="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          </button>
          <span class="player-time" id="player-time">0:00 / 0:00</span>
          <div class="volume-wrap">
            <svg viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <input type="range" class="volume-slider" id="volume-slider" min="0" max="1" step="0.05" value="1">
          </div>
        </div>
        <div class="progress-wrap" id="progress-wrap">
          <div class="progress-buffered" id="progress-buffered"></div>
          <div class="progress-loading" id="progress-loading"></div>
          <div class="progress-played"  id="progress-played"></div>
          <div class="progress-thumb"   id="progress-thumb"></div>
        </div>
        <div class="loading-label" id="loading-label">Loading…</div>
      </div>
    </div>
    <div class="card">
      <div id="track-list"></div>
    </div>
    <button class="secondary" id="logout-btn">Log Out</button>
  </div>

</div>
<script>
  const WORKER = 'https://audio-worker.azreon.workers.dev';

  // ── UI constants — edit these to customise labels and text ───────────
  const UI = {
    PLATFORM_NAME:      'Audio Platform',
    PLATFORM_ARTIST:    'Audio Platform',   // shown on lock screen
    PAGE_TITLE:         'Audio Platform',
    AUTH_SUBTITLE:      'Enter your email to receive an access code.',
    EMAIL_PLACEHOLDER:  'your@email.com',
    SEND_CODE_BTN:      'Send Code',
    OTP_TITLE:          'Enter Your Code',
    OTP_SUBTITLE:       'Check your email for the 6-digit code.',
    VERIFY_BTN:         'Verify',
    BACK_BTN:           'Back',
    LOGOUT_BTN:         'Log Out',
    NOW_PLAYING_IDLE:   'Select a track below',
    NO_TRACKS_MSG:      'No tracks available.',
    LOADING_TEXT:       'Loading\u2026',
  };

  // 'blob'   → streams immediately + downloads full file in background.
  //            When blob ready (and >30s remaining), switches cleanly to blob.
  //            No B2 timeouts, works offline after download. Recommended.
  // 'stream' → streams directly, no background download.
  const DOWNLOAD_MODE = 'blob';

  let token           = localStorage.getItem('ap_token');
  let currentTrack    = null;
  let sessionId       = newSessionId();
  let wasPlaying      = false;
  let hasPaused       = false;
  let isSwitchingBlob = false;
  let heartbeatTimer  = null;
  const HEARTBEAT_MS  = 30000;

  // Set to false to suppress heartbeat events from logs (reduces noise)
  // Heartbeats still fire internally — only logging is suppressed
  const LOG_HEARTBEAT = true;

  const audio = new Audio();
  audio.preload = 'auto';

  const $ = id => document.getElementById(id);

  // Apply UI constants to DOM
  document.title                                    = UI.PAGE_TITLE;
  document.querySelector('h1')                      && (document.querySelector('h1').textContent = UI.PLATFORM_NAME);
  document.querySelectorAll('h1')[1]                && (document.querySelectorAll('h1')[1].textContent = UI.OTP_TITLE);
  $('send-btn').textContent                         = UI.SEND_CODE_BTN;
  $('verify-btn').textContent                       = UI.VERIFY_BTN;
  $('back-btn').textContent                         = UI.BACK_BTN;
  $('logout-btn').textContent                       = UI.LOGOUT_BTN;
  $('now-playing').textContent                      = UI.NOW_PLAYING_IDLE;
  $('loading-label').textContent                    = UI.LOADING_TEXT;
  $('email-input').placeholder                      = UI.EMAIL_PLACEHOLDER;
  document.querySelector('.startup-label').textContent = UI.LOADING_TEXT;
  // Auth subtitles
  const subtitles = document.querySelectorAll('#auth-section p, #otp-section p');
  if (subtitles[0]) subtitles[0].textContent = UI.AUTH_SUBTITLE;
  if (subtitles[1]) subtitles[1].textContent = UI.OTP_SUBTITLE;

  if (token) {
    loadPlayer();
  } else {
    $('startup-loading').style.display = 'none';
    $('auth-section').style.display    = 'block';
  }

  $('send-btn').onclick = async () => {
    const email = $('email-input').value.trim();
    $('auth-msg').textContent = '';
    if (!email) { $('auth-msg').textContent = 'Please enter your email.'; return; }
    $('send-btn').disabled = true;
    const data = await post('/auth/send-otp', { email });
    $('send-btn').disabled = false;
    if (data.success) {
      $('auth-section').style.display = 'none';
      $('otp-section').style.display  = 'block';
      $('otp-input').focus();
    } else {
      $('auth-msg').textContent = data.message;
    }
  };

  $('verify-btn').onclick = async () => {
    const email = $('email-input').value.trim();
    const code  = $('otp-input').value.trim();
    $('otp-msg').textContent = '';
    $('verify-btn').disabled = true;
    const data = await post('/auth/verify-otp', { email, code });
    $('verify-btn').disabled = false;
    if (data.success) {
      token = data.token;
      localStorage.setItem('ap_token', token);
      $('otp-section').style.display = 'none';
      loadPlayer();
    } else {
      $('otp-msg').textContent = data.message;
    }
  };

  $('back-btn').onclick = () => {
    $('otp-section').style.display  = 'none';
    $('auth-section').style.display = 'block';
    $('otp-input').value = '';
    $('otp-msg').textContent = '';
  };

  $('otp-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') $('verify-btn').click();
  });

  async function loadPlayer() {
    const res = await fetch(WORKER + '/tracks', {
      headers: { Authorization: 'Bearer ' + token }
    });
    if (res.status === 401) { logout(); return; }
    const data = await res.json();
    $('startup-loading').style.display = 'none';
    $('auth-section').style.display    = 'none';
    $('otp-section').style.display     = 'none';
    $('player-section').style.display  = 'block';
    const list = $('track-list');
    list.innerHTML = '';
    if (!data.tracks || data.tracks.length === 0) {
      list.innerHTML = `<p style="color:#888;padding:14px;text-align:center">${UI.NO_TRACKS_MSG}</p>`;
      return;
    }
    data.tracks.forEach(track => {
      const div = document.createElement('div');
      div.className = 'track-item';
      div.dataset.trackId = track.id;
      div.innerHTML = `<div class="track-title">${track.title}</div>` +
        (track.duration ? `<div class="track-duration">${track.duration}</div>` : '');
      div.onclick = () => playTrack(track, div);
      list.appendChild(div);
    });
  }

  // ── Play a track ──────────────────────────────────────────────────────
  let currentBlobUrl = null;
  let fetchController = null;

  function playTrack(track, el) {
    document.querySelectorAll('.track-item').forEach(d => d.classList.remove('active'));
    if (el) el.classList.add('active');

    currentTrack    = track;
    sessionId       = newSessionId();
    wasPlaying      = false;
    hasPaused       = false;
    isSwitchingBlob = false;
    stopHeartbeat();
    stopWatchdog();

    if (fetchController) { fetchController.abort(); fetchController = null; }
    if (currentBlobUrl)  { URL.revokeObjectURL(currentBlobUrl); currentBlobUrl = null; }

    $('now-playing').textContent = track.title;
    $('btn-play').disabled = true;
    setLoading(true);

    const audioUrl = `${WORKER}/audio/${track.r2_key}?t=${encodeURIComponent(token)}`;

    // Load first — wait for canplay before playing
    // This gives the decoder time to initialise cleanly, preventing click/pop artefacts
    audio.src = audioUrl;
    audio.load();

    audio.addEventListener('canplay', function onCanPlay() {
      audio.removeEventListener('canplay', onCanPlay);
      $('btn-play').disabled = false;
      setLoading(false);
      audio.play().catch(() => {});
    }, { once: true });

    audio.addEventListener('error', function onErr() {
      audio.removeEventListener('error', onErr);
      $('btn-play').disabled = false;
      setLoading(false);
    }, { once: true });

    // Background blob download — switches to blob when ready
    if (DOWNLOAD_MODE === 'blob') {
      fetchController = new AbortController();
      const signal = fetchController.signal;

      fetch(audioUrl, { signal })
        .then(res => {
          if (!res.ok) throw new Error('Fetch failed');
          return res.blob();
        })
        .then(blob => {
          if (signal.aborted) return;
          if (audio.ended || !currentTrack) return;
          // Don't switch if less than 30s remaining — stay on stream, ended fires reliably
          const remaining = isFinite(audio.duration) ? audio.duration - audio.currentTime : 999;
          if (remaining < 30) return;
          const blobUrl = URL.createObjectURL(blob);
          currentBlobUrl = blobUrl;
          const pos     = audio.currentTime;
          const playing = !audio.paused;
          isSwitchingBlob = true;
          audio.src = blobUrl;
          // canplay fires as soon as duration is known — ensures ended fires correctly
          audio.addEventListener('canplay', function onBlobReady() {
            audio.removeEventListener('canplay', onBlobReady);
            if (!currentTrack || audio.ended) return;
            audio.currentTime = pos;
            if (playing) audio.play().catch(() => {});
            setTimeout(() => { isSwitchingBlob = false; }, 500);
          }, { once: true });
        })
        .catch(err => {
          if (err.name !== 'AbortError')
            console.warn('Background fetch failed, continuing from stream:', err);
        });
    }

    if ('mediaSession' in navigator) {
      navigator.mediaSession.metadata = new MediaMetadata({
        title: track.title, artist: UI.PLATFORM_ARTIST, album: '',
      });
      navigator.mediaSession.setActionHandler('play',  () => { audio.play().catch(() => {}); });
      navigator.mediaSession.setActionHandler('pause', () => { audio.pause(); });
      navigator.mediaSession.setActionHandler('stop',  () => { audio.pause(); logEvent('end'); });
    }
  }

  $('btn-play').onclick = () => {
    if (!currentTrack) return;
    if (audio.paused) audio.play().catch(() => {});
    else audio.pause();
  };

  $('volume-slider').oninput = function() { audio.volume = parseFloat(this.value); };

  audio.addEventListener('timeupdate',    updateProgress);
  audio.addEventListener('progress',      updateBuffered);
  audio.addEventListener('durationchange', updateProgress);

  function updateProgress() {
    const dur = audio.duration;
    const cur = audio.currentTime;
    if (!dur || isNaN(dur)) return;
    const pct = (cur / dur) * 100;
    $('progress-played').style.width = pct + '%';
    $('progress-thumb').style.left   = pct + '%';
    $('player-time').textContent     = `${fmt(cur)} / ${fmt(dur)}`;
  }

  function updateBuffered() {
    const dur = audio.duration;
    if (!dur || isNaN(dur) || audio.buffered.length === 0) return;
    const buffEnd = audio.buffered.end(audio.buffered.length - 1);
    $('progress-buffered').style.width = ((buffEnd / dur) * 100) + '%';
  }

  $('progress-wrap').addEventListener('click', function(e) {
    if (!audio.duration) return;
    const rect = this.getBoundingClientRect();
    const pct  = (e.clientX - rect.left) / rect.width;
    audio.currentTime = pct * audio.duration;
  });

  // ── Audio events ──────────────────────────────────────────────────────
  audio.addEventListener('play', () => {
    showPause(true);
    if (isSwitchingBlob) return;
    if (!wasPlaying) {
      logEvent('start');
      wasPlaying = true;
    } else if (hasPaused) {
      logEvent('resume');
      hasPaused = false;
    }
    startHeartbeat();
    resetWatchdog();
  });
  audio.addEventListener('ended', () => {
    showPause(false);
    logEvent('end');
    stopHeartbeat();
    stopWatchdog();
    wasPlaying = false;
    $('now-playing').textContent = UI.NOW_PLAYING_IDLE;
    $('progress-played').style.width = '0%';
    $('progress-thumb').style.left   = '0%';
  });
  audio.addEventListener('pause', () => {
    showPause(false);
    if (!audio.ended) { logEvent('pause'); hasPaused = true; }
    stopHeartbeat();
    stopWatchdog();
  });
  audio.addEventListener('waiting', () => { if (!audio.ended) setLoading(true); });
  audio.addEventListener('playing', () => setLoading(false));
  audio.addEventListener('stalled', () => {
    if (audio.ended) return;
    setLoading(true);
    logEvent('error');
  });

  // ── Watchdog ──────────────────────────────────────────────────────────
  let watchdogTimer = null;
  let lastPosition  = 0;

  function resetWatchdog() {
    clearInterval(watchdogTimer);
    lastPosition = audio.currentTime;
    watchdogTimer = setInterval(() => {
      if (document.visibilityState === 'hidden' || audio.ended) {
        lastPosition = audio.currentTime;
        return;
      }
      if (!audio.paused && audio.currentTime === lastPosition && currentTrack) {
        console.log('Watchdog: stall detected at', audio.currentTime);
        setLoading(true);
        showPause(false);
        logEvent('error');
        stopHeartbeat();
        clearInterval(watchdogTimer);
        const pos = audio.currentTime;
        audio.src = `${WORKER}/audio/${currentTrack.r2_key}?t=${encodeURIComponent(token)}`;
        audio.load();
        audio.currentTime = pos;
        audio.play().then(() => {
          setLoading(false);
          showPause(true);
          startHeartbeat();
          resetWatchdog();
        }).catch(() => { setLoading(false); });
      }
      lastPosition = audio.currentTime;
    }, 15000);
  }

  function stopWatchdog() {
    clearInterval(watchdogTimer);
    watchdogTimer = null;
  }

  document.addEventListener('visibilitychange', () => {
    if (!currentTrack || audio.ended) return;
    if (document.visibilityState === 'hidden') {
      logEvent('background');
    } else {
      lastPosition = audio.currentTime;
      if (!audio.paused) { logEvent('foreground'); resetWatchdog(); }
    }
  });

  function showPause(on) {
    $('icon-play').style.display  = on ? 'none' : '';
    $('icon-pause').style.display = on ? ''     : 'none';
  }

  function setLoading(on) {
    $('progress-loading').classList.toggle('active', on);
    $('loading-label').classList.toggle('active', on);
  }

  function fmt(s) {
    if (!s || isNaN(s)) return '0:00';
    const m = Math.floor(s / 60);
    const sec = Math.floor(s % 60).toString().padStart(2, '0');
    return `${m}:${sec}`;
  }

  function startHeartbeat() {
    stopHeartbeat();
    heartbeatTimer = setInterval(() => {
      if (LOG_HEARTBEAT) logEvent('heartbeat');
    }, HEARTBEAT_MS);
  }
  function stopHeartbeat() {
    if (heartbeatTimer) { clearInterval(heartbeatTimer); heartbeatTimer = null; }
  }

  function logEvent(type) {
    if (!currentTrack || !token) return;
    fetch(WORKER + '/log', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', Authorization: 'Bearer ' + token },
      body: JSON.stringify({
        clientTimestamp: new Date().toISOString(),
        trackId:    currentTrack.id,
        trackTitle: currentTrack.title,
        trackCode:  currentTrack.track_code ?? null,
        eventType:  type,
        positionMs: Math.round((audio.currentTime || 0) * 1000),
        durationMs: isFinite(audio.duration) ? Math.round(audio.duration * 1000) : null,
        sessionId,
      }),
    });
  }

  $('logout-btn').onclick = logout;
  function logout() {
    localStorage.removeItem('ap_token');
    token = null;
    location.reload();
  }

  function newSessionId() {
    return Math.random().toString(36).slice(2) + Date.now().toString(36);
  }

  async function post(path, body) {
    try {
      const res = await fetch(WORKER + path, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      return await res.json();
    } catch {
      return { success: false, message: 'Network error. Please try again.' };
    }
  }
</script>
</body>
</html>
