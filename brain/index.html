<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Brain Activity Visualizer</title>
  <style>
    /* Reset default margins and ensure the canvas fills the screen */
    body {
      margin: 0;
      background: #000;
      overflow: hidden;
      font-family: sans-serif;
    }
    /* Simple overlay UI for the index slider */
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      color: #fff;
      z-index: 10;
      background: rgba(0, 0, 0, 0.4);
      padding: 8px 12px;
      border-radius: 4px;
      font-size: 14px;
    }
    #slider {
      width: 200px;
    }
  </style>
</head>
<body>
  <!-- UI overlay to control the activity index in real time -->
  <div id="ui">
    <label for="slider">Activity Index: <span id="value">0.50</span></label>
    <br />
    <input type="range" id="slider" min="0" max="1" step="0.01" value="0.50" />
  </div>
  <!-- The main application script is loaded as a module -->
  <script type="module" src="./script.js"></script>
</body>
</html>
